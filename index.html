<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Onward — Duda Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root{
  --duda:#FB673E;--duda-deep:#E54E25;--duda-soft:#FFEDE5;--duda-tint:#FFF6F1;--duda-ink:#6E2916;
  --grape:#6D5BFF;--grape-soft:#ECE9FF;--leaf:#18A672;--leaf-soft:#DEF5EA;
  --sun:#F6BA1A;--sun-soft:#FDF1CC;--crimson:#DC2A2A;--crimson-soft:#FBE4E4;
  --paper:#F6F4EF;--paper-soft:#FBFAF6;--surface:#FFFFFF;
  --ink:#14141A;--ink-2:#2C2D38;--ink-muted:#686B7A;--ink-faint:#A8ABB8;
  --hairline:#E6E3DC;--hairline-soft:#EFEDE6;
  --accent:var(--duda);--danger:var(--crimson);--danger-soft:var(--crimson-soft);
  --sans:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
  --s-3:12px;--s-4:16px;--s-5:20px;--s-6:24px;--s-7:32px;--s-8:40px;--s-9:48px;--s-10:64px;
  --r-xs:6px;--r:10px;--r-lg:14px;--r-pill:999px;
  --sh-1:0 1px 2px rgba(20,20,26,.04),0 0 0 1px rgba(20,20,26,.03);
  --sh-2:0 4px 16px -2px rgba(20,20,26,.06),0 1px 3px rgba(20,20,26,.04);
  --sh-pop:0 30px 60px -20px rgba(20,20,26,.25),0 8px 20px -8px rgba(20,20,26,.12);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
input,textarea,select{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
ul,ol{margin:0;padding:0;list-style:none;}
h1,h2,h3,h4,h5,h6,p{margin:0;}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--duda);outline-offset:2px;}
#root{min-height:100vh;}
/* Layout */
.topbar{display:flex;align-items:center;gap:20px;padding:0 32px;height:64px;background:var(--surface);border-bottom:1px solid var(--hairline);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--duda);color:#fff;font-weight:800;font-size:15px;letter-spacing:-0.04em;flex-shrink:0;box-shadow:0 2px 4px rgba(251,103,62,.25);}
.brand-mark::after{content:'d';font-style:italic;position:relative;top:-1px;}
.brand sub{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);margin-left:6px;background:var(--paper);padding:3px 8px;border-radius:999px;white-space:nowrap;display:inline-block;}
.crumbs{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-muted);margin-left:16px;font-weight:500;overflow:hidden;min-width:0;}
.crumbs .sep{color:var(--ink-faint);}
.crumbs .now{color:var(--ink);font-weight:600;}
.crumb-btn{color:inherit;border-radius:6px;}
.crumb-btn:hover{text-decoration:underline;}
.topbar .spacer{flex:1;}
.view-toggle{display:inline-flex;border:1px solid var(--hairline);border-radius:var(--r-pill);padding:4px;background:var(--paper);gap:2px;}
.view-toggle button{font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--r-pill);color:var(--ink-muted);white-space:nowrap;transition:all .15s;}
.view-toggle button:hover:not(.on){color:var(--ink);}
.view-toggle button.on{background:var(--ink);color:#fff;}
.account-chip{display:inline-flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border:1px solid var(--hairline);border-radius:var(--r-pill);background:var(--surface);font-size:13px;font-weight:600;white-space:nowrap;}
.avatar{width:26px;height:26px;border-radius:var(--r-pill);background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.canvas{max-width:1320px;margin:0 auto;padding:40px 32px 80px;}
.canvas-wide{max-width:1480px;}
/* Typography */
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--duda);display:inline-flex;align-items:center;gap:8px;}
.eyebrow::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--duda);display:inline-block;}
.display-1{font-size:52px;line-height:1.04;letter-spacing:-0.032em;font-weight:700;}
.display-1 em{font-style:italic;font-weight:500;color:var(--duda);}
.display-2{font-size:38px;line-height:1.06;letter-spacing:-0.026em;font-weight:700;}
.h1{font-size:30px;line-height:1.12;letter-spacing:-0.02em;font-weight:700;}
.h2{font-size:21px;line-height:1.22;letter-spacing:-0.014em;font-weight:700;}
.lede{font-size:16px;line-height:1.55;font-weight:400;color:var(--ink-muted);}
.mono{font-family:var(--mono);}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.rule{height:1px;background:var(--hairline);border:0;margin:32px 0;}
.rule-soft{background:var(--hairline-soft);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid var(--hairline);background:var(--surface);font-size:13px;font-weight:600;border-radius:var(--r-pill);transition:all .15s;white-space:nowrap;color:var(--ink);}
.btn:hover{border-color:var(--ink);transform:translateY(-1px);box-shadow:var(--sh-1);}
.btn:active{transform:none;}
.btn.primary{background:var(--duda);color:#fff;border-color:var(--duda);}
.btn.primary:hover{background:var(--duda-deep);border-color:var(--duda-deep);}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-muted);}
.btn.ghost:hover{background:var(--paper);color:var(--ink);border-color:transparent;transform:none;box-shadow:none;}
.btn.danger-btn{background:var(--crimson-soft);color:var(--crimson);border-color:transparent;}
.btn.danger-btn:hover{background:var(--crimson);color:#fff;}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.lg{padding:12px 22px;font-size:14px;}
/* Pills */
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;font-size:11px;font-weight:600;border-radius:var(--r-pill);border:1px solid var(--hairline);background:var(--surface);color:var(--ink-2);white-space:nowrap;}
.pill .dot{width:6px;height:6px;border-radius:999px;background:var(--ink-faint);flex-shrink:0;}
.pill.done{background:var(--leaf-soft);border-color:transparent;color:#0E6E4B;}.pill.done .dot{background:var(--leaf);}
.pill.progress{background:var(--duda-soft);border-color:transparent;color:var(--duda-deep);}.pill.progress .dot{background:var(--duda);}
.pill.blocked{background:var(--crimson-soft);border-color:transparent;color:var(--crimson);}.pill.blocked .dot{background:var(--crimson);}
.pill.at_risk{background:var(--sun-soft);border-color:transparent;color:#8B5E0E;}.pill.at_risk .dot{background:var(--sun);}
.pill.not{background:var(--paper);color:var(--ink-muted);border-color:transparent;}.pill.not .dot{background:var(--ink-faint);}
.pill.skip,.pill.na{background:var(--paper);color:var(--ink-faint);border-color:transparent;}
.pill.defer{background:var(--sun-soft);border-color:transparent;color:#8B5E0E;}.pill.defer .dot{background:var(--sun);}
.pill.must{background:var(--ink);color:#fff;border-color:var(--ink);}
.pill.high{background:var(--grape-soft);border-color:transparent;color:#4A38D9;}
.pill.med,.pill.medium{color:var(--ink-muted);}
.pill.opt,.pill.optional,.pill.low{color:var(--ink-faint);border-style:dashed;}
/* Cards */
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r);transition:border-color .15s,box-shadow .15s;}
.card-pad{padding:24px;}
/* Form */
.field{display:flex;flex-direction:column;gap:8px;}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);}
.input,select.input,textarea.input{width:100%;padding:10px 13px;background:var(--surface);border:1.5px solid var(--hairline);border-radius:var(--r-xs);font-size:13.5px;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;color:var(--ink);}
.input:focus,select.input:focus,textarea.input:focus{border-color:var(--duda);box-shadow:0 0 0 4px var(--duda-soft);}
textarea.input{resize:vertical;min-height:90px;line-height:1.5;}
select.input{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23686B7A' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:34px;cursor:pointer;}
.search-bar{display:inline-flex;align-items:center;gap:10px;padding:8px 16px;border:1.5px solid var(--hairline);border-radius:var(--r-pill);background:var(--surface);color:var(--ink-muted);font-size:13px;min-width:280px;font-weight:500;transition:border-color .15s,box-shadow .15s;}
.search-bar:focus-within{border-color:var(--duda);box-shadow:0 0 0 4px var(--duda-soft);}
.search-bar input{background:transparent;border:0;outline:0;flex:1;color:var(--ink);font-weight:500;}
.search-bar input::placeholder{color:var(--ink-faint);}
/* Modal */
.scrim{position:fixed;inset:0;background:rgba(20,20,26,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:32px 24px;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:var(--r-lg);width:100%;max-height:calc(100vh - 64px);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-pop);animation:modalin .2s ease;}
@keyframes modalin{from{opacity:0;transform:translateY(8px) scale(.99);}to{opacity:1;transform:none;}}
.modal-sm{max-width:440px;}.modal-md{max-width:640px;}.modal-lg{max-width:900px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid var(--hairline-soft);}
.modal-body{padding:28px;overflow:auto;flex:1;}
.modal-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 28px;border-top:1px solid var(--hairline-soft);background:var(--paper-soft);}
.close-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;color:var(--ink-muted);transition:background .15s,color .15s;}
.close-btn:hover{background:var(--paper);color:var(--ink);}
/* Dropdown */
.dropdown-wrap{position:relative;display:inline-flex;}
.dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--sh-pop);min-width:190px;z-index:150;overflow:hidden;animation:modalin .12s ease;}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--ink);transition:background .1s;width:100%;text-align:left;border:0;background:none;cursor:pointer;}
.dd-item:hover{background:var(--paper);}
.dd-item.danger{color:var(--crimson);}
.dd-item.danger:hover{background:var(--crimson-soft);}
.dd-sep{height:1px;background:var(--hairline-soft);margin:4px 0;}
/* Flex helpers */
.flex{display:flex;}.flex-col{display:flex;flex-direction:column;}
.items-center{align-items:center;}.items-start{align-items:flex-start;}.items-end{align-items:flex-end;}
.justify-between{justify-content:space-between;}.justify-end{justify-content:flex-end;}
.gap-2{gap:8px;}.gap-3{gap:12px;}.gap-4{gap:16px;}.gap-5{gap:20px;}
.muted{color:var(--ink-muted);}.faint{color:var(--ink-faint);}
.text-sm{font-size:12px;}.text-xs{font-size:11px;}.text-md{font-size:14px;}
.semibold{font-weight:600;}.bold{font-weight:700;}
.italic{font-style:italic;}
.tabnum{font-variant-numeric:tabular-nums;}
.w-full{width:100%;}
::selection{background:var(--duda-soft);color:var(--duda-ink);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:999px;border:3px solid var(--paper);}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}
/* Dashboard */
.dash-hero{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end;padding-bottom:32px;margin-bottom:40px;border-bottom:1px solid var(--hairline);}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.dash-stat{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r);padding:16px 18px 18px;transition:border-color .15s,transform .15s;}
.dash-stat:hover{border-color:var(--ink-faint);transform:translateY(-1px);}
.dash-stat .s-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:600;}
.dash-stat .s-value{font-size:36px;font-weight:700;line-height:1;margin-top:10px;letter-spacing:-0.035em;}
.dash-stat .s-delta{font-size:11px;color:var(--ink-muted);margin-top:8px;font-weight:500;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.toolbar .t-left{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
.toolbar .t-right{display:flex;align-items:center;gap:10px;}
.tab-row{display:flex;gap:4px;border-bottom:1px solid var(--hairline);margin-bottom:24px;overflow-x:auto;}
.tab-row button{padding:12px 16px 14px;font-size:13px;font-weight:600;color:var(--ink-muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;transition:color .15s,border-color .15s;}
.tab-row button:hover{color:var(--ink);}
.tab-row button.on{color:var(--ink);border-bottom-color:var(--duda);}
.tab-row button .badge{font-size:11px;font-weight:600;color:var(--ink-muted);background:var(--paper);padding:2px 7px;border-radius:999px;}
.tab-row button.on .badge{color:var(--duda-deep);background:var(--duda-soft);}
.seg{display:inline-flex;border:1.5px solid var(--hairline);border-radius:var(--r-pill);background:var(--surface);padding:3px;}
.seg button{padding:5px 14px;font-size:12px;font-weight:600;color:var(--ink-muted);border-radius:var(--r-pill);transition:all .15s;}
.seg button:hover:not(.on){color:var(--ink);}
.seg button.on{background:var(--ink);color:#fff;}
/* Client table */
.client-table{background:var(--surface);border:1px solid var(--hairline);border-radius:14px;overflow:hidden;}
.client-row{display:grid;grid-template-columns:1.8fr 1fr 1.4fr 0.9fr 1fr 0.5fr;align-items:center;gap:18px;padding:18px 24px;border-bottom:1px solid var(--hairline-soft);transition:background .12s;}
.client-row.clickable{cursor:pointer;}
.client-row:last-child{border-bottom:0;}
.client-row.clickable:hover{background:var(--duda-tint);}
.client-row.head{background:var(--paper-soft);cursor:default;padding:12px 24px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:700;}
.client-id{display:flex;align-items:center;gap:14px;}
.client-logo{width:40px;height:40px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-0.02em;}
.client-logo.lg{width:60px;height:60px;font-size:22px;border-radius:var(--r);}
.client-name{font-weight:700;font-size:14px;letter-spacing:-0.01em;}
.client-sub{font-size:11.5px;color:var(--ink-muted);margin-top:2px;font-weight:500;}
.mini-bar{display:flex;align-items:center;gap:3px;}
.mini-bar .mb-seg{flex:1;height:6px;background:var(--hairline-soft);border-radius:999px;position:relative;overflow:hidden;}
.mini-bar .mb-seg .mb-fill{position:absolute;inset:0 auto 0 0;background:var(--ink);border-radius:999px;}
.mini-bar .mb-seg.cur .mb-fill{background:var(--duda);}
.day-ctr{display:flex;align-items:baseline;gap:5px;}
.day-ctr .n{font-size:22px;font-weight:700;letter-spacing:-0.03em;line-height:1;}
.day-ctr .l{font-size:11px;color:var(--ink-muted);white-space:nowrap;font-weight:500;}
/* Tracker */
.tracker-head{display:flex;align-items:flex-end;gap:32px;padding-bottom:32px;border-bottom:1px solid var(--hairline);margin-bottom:32px;}
.tracker-head .info{flex:1;}
.tracker-head .meta{display:flex;gap:24px;font-size:13px;color:var(--ink-muted);margin-top:14px;flex-wrap:wrap;font-weight:500;}
.tracker-head .meta b{color:var(--ink);font-weight:700;}
.tracker-head .t-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
/* Journey */
.journey{position:relative;padding:40px 32px 28px;margin-bottom:32px;background:radial-gradient(circle at 14% 30%,var(--duda-soft) 0%,transparent 55%),radial-gradient(circle at 86% 70%,var(--grape-soft) 0%,transparent 55%),var(--surface);border:1px solid var(--hairline);border-radius:14px;overflow:hidden;}
.journey-track{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.journey-line{position:absolute;top:56px;left:10%;right:10%;height:2px;border-radius:999px;background:var(--hairline);z-index:0;}
.journey-line .jl-fill{position:absolute;left:0;top:0;height:100%;background:var(--ink);border-radius:999px;}
.j-station{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 4px;border-radius:var(--r);transition:background .12s;min-height:130px;}
.j-station:hover{background:rgba(255,255,255,.6);}
.j-station .s-num{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;height:14px;line-height:14px;}
.j-station .s-dot{margin:12px 0 16px;width:22px;height:22px;border-radius:999px;background:#fff;border:2px solid var(--ink-faint);display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.j-station .s-dot::after{content:'';width:8px;height:8px;border-radius:999px;background:var(--ink-faint);}
.j-station.done .s-dot{background:var(--ink);border-color:var(--ink);}.j-station.done .s-dot::after{background:#fff;}
.j-station.current .s-dot{background:var(--duda);border-color:var(--duda);box-shadow:0 0 0 8px var(--duda-soft);}.j-station.current .s-dot::after{background:#fff;}
.j-station .s-name{font-size:14px;font-weight:700;letter-spacing:-0.014em;line-height:1.22;max-width:140px;min-height:36px;color:var(--ink);}
.j-station .s-meta{font-size:11px;color:var(--ink-muted);margin-top:8px;font-weight:600;white-space:nowrap;}
.j-station.current .s-meta{color:var(--duda-deep);font-weight:700;}
.j-caption{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:20px;padding-top:18px;border-top:1px solid var(--hairline-soft);}
.j-caption .jc-col{text-align:center;padding:0 8px;font-size:12px;color:var(--ink-muted);line-height:1.45;font-weight:500;}
/* Phase / step */
.phase-group{margin-bottom:40px;}
.phase-head{display:flex;align-items:baseline;gap:16px;padding-bottom:10px;border-bottom:2px solid var(--ink);margin-bottom:8px;}
.phase-head .ph-num{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--duda);font-weight:700;}
.phase-head .ph-h2{flex:1;}
.phase-head .ph-meta{font-size:12px;color:var(--ink-muted);font-weight:600;}
.step-row{display:grid;grid-template-columns:28px 1.8fr 0.8fr 0.6fr 0.7fr 0.7fr 28px;align-items:center;gap:14px;padding:14px 8px;border-bottom:1px solid var(--hairline-soft);transition:background .12s;border-radius:6px;}
.step-row:last-child{border-bottom:0;}
.step-row.clickable{cursor:pointer;}
.step-row.clickable:hover{background:var(--paper-soft);}
.step-row.done .step-title b{text-decoration:line-through;text-decoration-color:var(--ink-faint);text-decoration-thickness:1.5px;color:var(--ink-muted);}
.step-check{width:22px;height:22px;border:1.5px solid var(--ink-faint);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface);flex-shrink:0;transition:all .15s;cursor:pointer;}
.step-check:hover{border-color:var(--duda);}
.step-row.done .step-check{background:var(--leaf);border-color:var(--leaf);color:#fff;}
.step-row.progress .step-check{border-color:var(--duda);background:var(--duda-soft);}
.step-row.progress .step-check::after{content:'';width:10px;height:10px;background:var(--duda);border-radius:3px;}
.step-row.blocked .step-check{border-color:var(--crimson);background:var(--crimson-soft);}
.step-row.blocked .step-check::after{content:'';width:12px;height:2px;background:var(--crimson);border-radius:999px;}
.step-row.at_risk .step-check{border-color:var(--sun);background:var(--sun-soft);}
.step-title b{font-weight:600;font-size:13.5px;color:var(--ink);display:block;}
.step-title .s-why{font-size:12px;color:var(--ink-muted);margin-top:2px;font-weight:500;line-height:1.4;}
.step-owner{font-size:12px;color:var(--ink-muted);font-weight:500;}
.step-due{font-size:12px;color:var(--ink-muted);font-weight:600;}
.step-due.late{color:var(--crimson);}
/* Rail */
.rail{display:grid;grid-template-columns:1fr 300px;gap:32px;}
.rail-card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r);padding:24px;}
.rail-card+.rail-card{margin-top:20px;}
.rail-card h4{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);margin-bottom:14px;font-weight:700;}
.contact-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--hairline-soft);}
.contact-row:last-child{border-bottom:0;}
.activity-dot{position:relative;padding:10px 0 10px 24px;font-size:12px;line-height:1.5;color:var(--ink-2);font-weight:500;}
.activity-dot::before{content:'';position:absolute;left:4px;top:15px;width:8px;height:8px;background:var(--duda);border-radius:999px;border:2px solid var(--surface);}
.activity-dot::after{content:'';position:absolute;left:7px;top:24px;bottom:-10px;width:1px;background:var(--hairline);}
.activity-dot:last-child::after{display:none;}
.activity-dot time{font-size:11px;color:var(--ink-faint);display:block;margin-top:2px;font-weight:600;}
/* Resource cards */
.resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:12px;}
.resource-card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r);padding:16px;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px;}
.resource-card:hover{border-color:var(--duda);box-shadow:var(--sh-1);}
.resource-card a{color:var(--duda);font-size:13px;font-weight:600;text-decoration:none;}
.resource-card a:hover{text-decoration:underline;}
.resource-card .rc-type{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;color:var(--ink-muted);}
.resource-card .rc-desc{font-size:12px;color:var(--ink-muted);line-height:1.45;}
.resource-card .rc-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--duda-soft);color:var(--duda-deep);display:inline-block;align-self:flex-start;}
/* Gantt */
.gantt{background:var(--surface);border:1px solid var(--hairline);border-radius:14px;overflow:hidden;}
.gantt-head{display:grid;grid-template-columns:220px 1fr;background:var(--paper-soft);border-bottom:1px solid var(--hairline);}
.gantt-head .gh-left{padding:14px 18px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:700;}
.gantt-head .gh-scale{display:flex;}
.gantt-head .gh-tick{flex:1;padding:14px 10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);border-left:1px solid var(--hairline-soft);font-weight:700;}
.gantt-body{position:relative;}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--duda);z-index:3;}
.gantt-today::before{content:'TODAY';position:absolute;top:-16px;left:-18px;font-size:9px;font-weight:700;letter-spacing:0.12em;color:#fff;background:var(--duda);padding:3px 6px;border-radius:4px;}
.gantt-row{display:grid;grid-template-columns:220px 1fr;border-bottom:1px solid var(--hairline-soft);min-height:44px;align-items:center;}
.gantt-row.gr-phase{background:var(--paper-soft);border-bottom:1px solid var(--hairline);}
.gantt-row .gr-label{padding:10px 16px;font-size:12.5px;font-weight:500;border-right:1px solid var(--hairline-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gantt-row.gr-phase .gr-label{font-weight:700;font-size:13.5px;}
.gantt-row .gr-lane{position:relative;height:100%;min-height:44px;}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:24px;border-radius:6px;background:var(--ink);color:#fff;font-size:11px;display:flex;align-items:center;padding:0 8px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gantt-bar.done{background:var(--leaf);}
.gantt-bar.progress{background:var(--duda);}
.gantt-bar.blocked,.gantt-bar.at_risk{background:var(--crimson-soft);color:var(--crimson);border:1px solid var(--crimson);}
.gantt-bar.not{background:var(--surface);color:var(--ink-muted);border:1.5px dashed var(--ink-faint);}
.gantt-bar.phase-bar{height:5px;border-radius:999px;opacity:0.7;}
/* Plan */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.plan-card{background:var(--surface);border:1px solid var(--hairline);border-radius:14px;padding:32px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.plan-card:hover{transform:translateY(-2px);box-shadow:var(--sh-2);}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
.plan-card:nth-child(1)::before{background:var(--duda);}
.plan-card:nth-child(2)::before{background:var(--grape);}
.plan-card:nth-child(3)::before{background:var(--leaf);}
.plan-card .day-big{font-size:88px;line-height:0.9;letter-spacing:-0.05em;font-weight:800;}
.plan-card .day-big sup{font-size:20px;font-weight:600;color:var(--ink-muted);}
.plan-card .day-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);margin-top:8px;font-weight:700;}
.plan-card h3{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:16px 0 8px;}
.plan-card .plan-goal{font-size:14px;font-weight:500;line-height:1.5;color:var(--ink-muted);}
.plan-milestones{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.plan-ms{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.45;font-weight:500;}
.plan-ms .ms-dot{flex-shrink:0;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ink-faint);margin-top:1px;display:inline-flex;align-items:center;justify-content:center;}
.plan-ms.done .ms-dot{background:var(--leaf);border-color:var(--leaf);color:#fff;}
/* Client shell */
.client-shell{min-height:100vh;background:var(--paper);}
.client-mast{padding:64px 64px 40px;border-bottom:1px solid var(--hairline);background:radial-gradient(circle at 100% 0%,var(--duda-soft) 0%,transparent 45%),var(--surface);}
.client-mast .container{max-width:1100px;margin:0 auto;}
.client-title{font-size:60px;line-height:1.02;letter-spacing:-0.04em;font-weight:800;margin-top:18px;}
.client-title em{font-style:italic;font-weight:500;color:var(--duda);}
.client-progress{margin-top:40px;display:flex;align-items:center;gap:28px;}
.cp-ring{flex-shrink:0;width:96px;height:96px;position:relative;}
.cp-ring svg{width:96px;height:96px;transform:rotate(-90deg);}
.cp-ring .ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;letter-spacing:-0.03em;}
.cp-meta{flex:1;}
.cp-meta .cp-label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:700;}
.cp-meta .cp-value{font-size:24px;font-weight:700;margin-top:6px;line-height:1.2;}
.cp-meta .cp-sub{font-size:13px;color:var(--ink-muted);margin-top:4px;font-weight:500;}
/* Team */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.team-card{background:var(--surface);border:1px solid var(--hairline);border-radius:14px;padding:24px;transition:transform .15s,box-shadow .15s;}
.team-card:hover{transform:translateY(-2px);box-shadow:var(--sh-2);}
.team-card .tc-top{display:flex;align-items:center;gap:14px;min-width:0;}
.team-card .tc-name{font-size:18px;font-weight:700;letter-spacing:-0.02em;line-height:1.15;}
.team-card .tc-role{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--duda);margin-top:5px;font-weight:700;}
.team-card .tc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px;padding-top:14px;border-top:1px solid var(--hairline-soft);}
.team-card .tc-stat .n{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.team-card .tc-stat .l{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);font-weight:600;margin-top:2px;}
/* Login */
.login-shell{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;background:var(--surface);}
.login-poster{position:relative;background:radial-gradient(ellipse at 20% 30%,var(--duda-soft) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,var(--grape-soft) 0%,transparent 50%),var(--paper);border-right:1px solid var(--hairline);padding:64px 56px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;}
.login-poster::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(20,20,26,.04) 1px,transparent 0);background-size:24px 24px;pointer-events:none;}
.brand-big{font-size:80px;line-height:1;letter-spacing:-0.04em;font-weight:800;color:var(--ink);position:relative;z-index:1;}
.brand-big em{font-style:italic;font-weight:500;color:var(--duda);}
.login-form{padding:56px;display:flex;flex-direction:column;justify-content:center;max-width:460px;margin:0 auto;width:100%;}
.pin-row{display:flex;gap:12px;margin:20px 0;position:relative;}
.pin-cell{width:60px;height:68px;border:1.5px solid var(--hairline);border-radius:var(--r);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;transition:all .15s;pointer-events:none;}
.pin-cell.on{border-color:var(--duda);background:var(--duda-tint);box-shadow:0 0 0 4px var(--duda-soft);}
.tag{display:inline-flex;align-items:center;padding:3px 9px;font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--paper);border:1px solid var(--hairline);color:var(--ink-muted);border-radius:var(--r-pill);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

.twk-panel{position:fixed;right:16px;bottom:16px;z-index:9999;width:272px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.92);color:#29261b;backdrop-filter:blur(20px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden;}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none;}
.twk-hd b{font-size:12px;font-weight:600;}
.twk-x{border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;}
.twk-x:hover{background:rgba(0,0,0,.06);color:#29261b;}
.twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0;}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0;}
.twk-sect:first-child{padding-top:0;}
.twk-row{display:flex;flex-direction:column;gap:4px;}
.twk-label{font-size:11px;font-weight:500;color:rgba(41,38,27,.72);}
.twk-field{appearance:none;width:100%;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none;}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;}
.twk-toggle[data-on="1"]{background:#34c759;}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s;}
.twk-toggle[data-on="1"] i{transform:translateX(14px);}
.twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;}

@media(max-width:1100px){
  .rail{grid-template-columns:1fr;}
  .plan-grid{grid-template-columns:1fr;}

  .topbar{padding:12px 20px;height:auto;flex-wrap:wrap;}
  .crumbs{order:3;width:100%;margin-left:0;}
}

  .client-title{font-size:32px;}
}

function getStepCounts(steps){
  const c={};
  PHASES.forEach(p=>{
    const ps=steps.filter(s=>s.phase===p.id);
    c[p.id]={done:ps.filter(s=>s.status==='done').length,total:ps.length};
  });
  return c;
}
function getNextStep(steps,client){
  const order=PHASES.map(p=>p.id);
  const ci=order.indexOf(client.phase);
  return steps.find(s=>s.status!=='done'&&s.status!=='skip'&&s.status!=='na'&&order.indexOf(s.phase)>=ci)||null;
}

// ─── Dropdown ─────────────────────────────────────────────────────────────────
function Dropdown({trigger,items,align='right'}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h,true);
    return()=>document.removeEventListener('mousedown',h,true);
  },[open]);
  return(
    <div className="dropdown-wrap" ref={ref}>
      <button type="button"
        onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
        className="close-btn" aria-label="More actions"
        style={{width:28,height:28}}>
        {trigger||I.dots}
      </button>
      {open&&(
        <div className="dropdown-menu" style={{[align==='left'?'left':'right']:0}} onClick={e=>e.stopPropagation()}>
          {items.map((item,i)=>
            item===null
              ?<div key={i} className="dd-sep"/>
              :<button key={i} type="button"
                  className={`dd-item${item.danger?' danger':''}`}
                  onClick={()=>{item.onClick();setOpen(false);}}>

// ─── Gantt ────────────────────────────────────────────────────────────────────
function Gantt({steps}){
  if(!steps.length)return null;
  const min=Math.min(...steps.map(s=>s.start));
  const max=Math.max(...steps.map(s=>s.due));
  const range=Math.max(max-min,1);
  const today=28;
  const todayPct=clamp((today-min)/range,0,1);
  const ticks=[];
  for(let d=Math.ceil(min/30)*30;d<=max;d+=30)ticks.push(d);
  const barFor=s=>{
    const l=((s.start-min)/range)*100;
    const w=Math.max(((s.due-s.start)/range)*100,1.5);
    return{left:`${l}%`,width:`${w}%`};
  };
  return(
    <div className="gantt">
      <div className="gantt-head">
        <div className="gh-left">Phase · Task</div>
        <div className="gh-scale">{ticks.map(d=><div key={d} className="gh-tick">Day {d}</div>)}</div>
      </div>
      <div className="gantt-body">
        <div className="gantt-today" style={{left:`calc(220px + (100% - 220px) * ${todayPct})`}}/>
        {PHASES.map(p=>{
          const ps=steps.filter(s=>s.phase===p.id);
          if(!ps.length)return null;
          const pm=Math.min(...ps.map(s=>s.start)),px=Math.max(...ps.map(s=>s.due));
          const l=((pm-min)/range)*100,w=((px-pm)/range)*100;
          return(
            <React.Fragment key={p.id}>
              <div className="gantt-row gr-phase">
                <div className="gr-label"><span className="mono faint" style={{fontSize:10}}>Phase {p.num}</span> {p.short}</div>
                <div className="gr-lane"><div className="gantt-bar phase-bar" style={{left:`${l}%`,width:`${w}%`,background:'var(--ink)'}}/></div>
              </div>
              {ps.map(s=>(
                <div key={s.id} className="gantt-row">
                  <div className="gr-label" title={s.title}>{s.title}</div>
                  <div className="gr-lane"><div className={`gantt-bar ${s.status}`} style={barFor(s)} title={`${s.title} · Day ${s.start}–${s.due}`}>{s.title}</div></div>
                </div>
              ))}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function Login({team,onSuccess}){
  const [pin,setPin]=React.useState('');

  const [sel,setSel]=React.useState(team[0]?.id||'');

  function tryPin(p){if(p==='1234')onSuccess();else{setErr(true);setPin('');}}
  function handleChange(e){
    const v=e.target.value.replace(/\D/g,'').slice(0,4);
    setPin(v);setErr(false);
    if(v.length===4)tryPin(v);
  }
 
  return(
    <div className="login-shell">
      <aside className="login-poster">
        <div><div className="brand"><span className="brand-mark"/> Onward<sub style={{marginLeft:6}}>by Duda</sub></div></div>

        </div>
        <div className="flex gap-3 text-xs muted"><span>© 2026 Duda</span><span>·</span><span>Onboarding ops v3.2</span></div>
      </aside>
      <div className="login-form">
        <div className="eyebrow">Sign in · Duda team</div>
        <h2 className="h1" style={{marginTop:8,fontSize:34}}>Pick your account.</h2>
        <p className="muted" style={{marginTop:8,fontSize:15}}>Select your AM profile, then enter your PIN.</p>
        <div style={{marginTop:24,display:'flex',flexDirection:'column',gap:8}} role="radiogroup">
          {team.filter(t=>t.role==='Staff').map(t=>(
            <button key={t.id} type="button" className="flex items-center gap-3 card card-pad" role="radio" aria-checked={sel===t.id}
              style={{padding:12,textAlign:'left',borderColor:sel===t.id?'var(--ink)':'var(--hairline)',borderWidth:'1px',borderStyle:'solid',borderRadius:10}}
              onClick={()=>{setSel(t.id);setErr(false);setPin('');inputRef.current?.focus();}}>
              <span className="client-logo" style={{background:t.color,width:32,height:32,fontSize:13,borderRadius:999}}>{t.mono}</span>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{t.name}</div><div className="muted text-xs">{t.role} · {t.clients} clients</div></div>
              {sel===t.id&&<span className="pill done"><span className="dot"/>Selected</span>}
            </button>
          ))}
        </div>
        <div style={{marginTop:26}}>
          <div className="eyebrow" style={{marginBottom:8}}>Enter PIN</div>
          <div style={{position:'relative'}}>
            <div className="pin-row" aria-hidden="true">
              {[0,1,2,3].map(i=><div key={i} className={`pin-cell${pin[i]?' on':''}`}>{pin[i]?'•':''}</div>)}
            </div>
            <input ref={inputRef} autoFocus value={pin} maxLength={4} inputMode="numeric" pattern="[0-9]*"
              aria-label="Enter PIN" onChange={handleChange} onKeyDown={e=>e.key==='Enter'&&tryPin(pin)}
              style={{position:'absolute',inset:0,opacity:0,cursor:'text',zIndex:2,width:'100%'}}/>
          </div>
          <div className="muted text-xs">Default PIN: <b className="mono">1234</b>.{err&&<span style={{color:'var(--danger)'}}> · Incorrect — try again.</span>}</div>
          <button type="button" className="btn primary lg" style={{marginTop:18,width:'100%',justifyContent:'center'}} onClick={()=>tryPin(pin)}>Continue {I.arrow}</button>
        </div>
      </div>
    </div>
  );
}

              <div className="field"><label>Assigned AM</label><select className="input" value={am} onChange={e=>setAm(e.target.value)}>{AMS.map(a=><option key={a}>{a}</option>)}</select></div>
            </div>
            <div className="field"><label>Build flow *</label><div className="flex gap-2" style={{flexWrap:'wrap'}}>{['DIFM','DIY','Hybrid','Migration','Marketplace'].map(o=><button key={o} type="button" className={`btn sm${flow===o?' primary':''}`} onClick={()=>setFlow(o)}>{o}</button>)}</div></div>
            <div className="field"><label>Touch level</label><div className="seg" style={{alignSelf:'flex-start'}}><button type="button" className={touch==='High-Touch'?'on':''} onClick={()=>setTouch('High-Touch')}>High-Touch</button><button type="button" className={touch==='Low-Touch'?'on':''} onClick={()=>setTouch('Low-Touch')}>Low-Touch</button></div></div>
          </div>
        )}
        {tab==='brand'&&(
          <div className="flex-col gap-5">
            <div className="eyebrow">Brand colour</div>
            <div className="flex gap-3" style={{flexWrap:'wrap',alignItems:'center'}}>
              {COLORS.map(c=><button key={c} type="button" onClick={()=>setColor(c)} style={{width:40,height:40,borderRadius:999,background:c,border:color===c?'2px solid var(--ink)':'1px solid var(--hairline)',outline:color===c?'2px solid var(--paper)':'none',outlineOffset:'-3px'}} aria-label={c}/>)}
              <input type="text" value={color} onChange={e=>setColor(e.target.value)} className="input mono" style={{width:100,fontSize:12}}/>
            </div>
            <div className="flex items-center gap-4" style={{marginTop:8}}>
              <div className="muted text-xs">Preview</div>
              <span className="client-logo lg" style={{background:color}}>{name?name.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2):'??'}</span>
              <div><div style={{fontWeight:700,fontSize:16}}>{name||'Company name'}</div><div className="muted text-sm">{icp} · {flow}</div></div>
            </div>
          </div>
        )}
        {tab==='review'&&(
          <div>
            <div style={{background:'var(--surface)',border:'1px solid var(--hairline)',borderRadius:10,padding:20,marginBottom:20}}>
              <div className="flex items-center gap-3" style={{marginBottom:14}}>
                <span className="client-logo lg" style={{background:color}}>{name?name.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2):'??'}</span>
                <div><div style={{fontWeight:700,fontSize:18}}>{name||'—'}</div><div className="muted text-sm">{icp} · {flow} · {touch}</div></div>
              </div>
              <div className="flex gap-5 flex-wrap" style={{fontSize:13}}>
                <span><b>Country:</b> {country.replace(/^\S+\s*/,'')}</span>
                <span><b>Kickoff:</b> {kickoff}</span>
                <span><b>AM:</b> {am}</span>
                <span><b>Contact:</b> {cName||'—'}</span>
              </div>
            </div>
            <p className="muted text-sm" style={{lineHeight:1.55}}>{INITIAL_STEPS.length} onboarding tasks will be created from the standard template, pre-filtered for <b>{icp}</b> / <b>{flow}</b>. You can customize them from the client tracker after saving.</p>
          </div>
        )}
      </div>
      <div className="modal-foot">
        <span className="muted text-xs">{name?<>Creating <b>{name}</b></>:'Fill in client info above'}</span>
        <div className="flex gap-2">
          <button type="button" className="btn" onClick={onClose}>Cancel</button>
          {tab!=='info'&&<button type="button" className="btn" onClick={()=>setTab(tab==='brand'?'info':'brand')}>{I.arrowL} Back</button>}
          {tab!=='review'&&<button type="button" className="btn primary" onClick={()=>setTab(tab==='info'?'brand':'review')}>Continue {I.arrow}</button>}
          {tab==='review'&&<button type="button" className="btn primary" onClick={handleSave}>Save client {I.check}</button>}
        </div>
      </div>
    </Modal>
  );
}
 
// ─── Edit Step Modal ───────────────────────────────────────────────────────────
function EditStepModal({step,onClose,onSave}){
  const [title,setTitle]=React.useState(step.title);
  const [why,setWhy]=React.useState(step.why);
  const [status,setStatus]=React.useState(step.status);
  const [owner,setOwner]=React.useState(step.owner);
  const [prio,setPrio]=React.useState(step.prio);
  const [note,setNote]=React.useState('');
  const ph=PHASES.find(p=>p.id===step.phase);
 
  return(
    <Modal size="md" onClose={onClose}>
      <ModalHead title={step.id} eyebrow={ph?`Phase ${ph.num} — ${step.ws}`:step.ws} onClose={onClose}/>
      <div className="modal-body" style={{background:'var(--paper-soft)'}}>
        <div className="field" style={{marginBottom:16}}>
          <label>Task title</label>
          <input className="input" value={title} onChange={e=>setTitle(e.target.value)}/>
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>Status</label>
          <div className="flex gap-2" style={{flexWrap:'wrap'}}>
            {Object.keys(STATUS_MAP).map(k=><button key={k} type="button" onClick={()=>setStatus(k)} className={`btn sm${status===k?' primary':''}`}>{STATUS_MAP[k].label}</button>)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
          <div className="field"><label>Owner</label><input className="input" value={owner} onChange={e=>setOwner(e.target.value)} placeholder="e.g. Duda AM"/></div>
          <div className="field"><label>Priority</label><select className="input" value={prio} onChange={e=>setPrio(e.target.value)}>{Object.keys(PRIO_MAP).map(k=><option key={k} value={k}>{PRIO_MAP[k].label}</option>)}</select></div>
        </div>
        <div className="rule rule-soft"/>
        <div style={{marginTop:16}}>
          <div className="eyebrow" style={{marginBottom:6,color:'var(--duda-ink)'}}>AM internal note · not shown to client</div>
          <textarea className="input" placeholder="Notes only Duda sees…" value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <div style={{marginTop:14}}>
          <div className="eyebrow" style={{marginBottom:6}}>Client-facing — why it matters</div>
          <textarea className="input" value={why} onChange={e=>setWhy(e.target.value)}/>
        </div>
        {step.resources&&step.resources.length>0&&(
          <div style={{marginTop:14}}>
            <div className="eyebrow" style={{marginBottom:8}}>Linked resources</div>
            <div className="flex gap-2" style={{flexWrap:'wrap'}}>
              {step.resources.map((r,i)=><span key={i} className="tag">{r}</span>)}
            </div>
          </div>
        )}
        <div style={{marginTop:14}}>
          <div className="eyebrow" style={{marginBottom:4}}>Applies to</div>
          <div className="flex gap-3 text-xs muted">
            <span>Flows: {step.flows}</span>
            <span>Segments: {step.segments}</span>
          </div>
        </div>
      </div>
      <div className="modal-foot">
        <button type="button" className="btn danger-btn" onClick={()=>{if(window.confirm('Delete this task?')){onSave({...step,_delete:true});onClose();}}}>Delete task</button>
        <div className="flex gap-2">
          <button type="button" className="btn" onClick={onClose}>Cancel</button>
          <button type="button" className="btn primary" onClick={()=>{onSave({...step,title,why,status,owner,prio});onClose();}}>Save task</button>
        </div>
      </div>
    </Modal>
  );
}
 
// ─── Add Team Modal ────────────────────────────────────────────────────────────
function AddTeamModal({onClose,onSave}){
  const [name,setName]=React.useState('');
  const [email,setEmail]=React.useState('');
  const [role,setRole]=React.useState('Staff');
  const [pin,setPin]=React.useState('');
  function gen(){setPin(String(Math.floor(1000+Math.random()*9000)));}
  function handleSave(){
    if(!name.trim()){alert('Enter a name.');return;}
    const colors=['#1F3A5F','#5C6B4A','#B8543A','#B8854A','#4F5A66','#2C5F6E'];
    onSave({id:'t'+uid(),name:name.trim(),email,role,mono:ini(name.trim()),clients:0,open:0,resolved:0,color:colors[Math.floor(Math.random()*colors.length)]});
    onClose();
  }
  return(
    <Modal size="md" onClose={onClose}>
      <ModalHead title="Add team member" eyebrow="Onboarding team" onClose={onClose}/>
      <div className="modal-body" style={{background:'var(--paper-soft)'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <div className="field"><label>Full name *</label><input className="input" placeholder="Avery Okonkwo" value={name} onChange={e=>setName(e.target.value)} autoFocus/></div>
          <div className="field"><label>Email</label><input className="input" placeholder="avery@duda.co" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>Role *</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[{k:'Staff',sub:'Own clients'},{k:'Executive',sub:'Read-only org'},{k:'Admin',sub:'Full access'}].map(o=>(
              <button key={o.k} type="button" onClick={()=>setRole(o.k)} className="card card-pad" style={{padding:12,textAlign:'left',borderColor:role===o.k?'var(--ink)':'var(--hairline)',borderWidth:'1px',borderStyle:'solid',borderRadius:10,background:role===o.k?'var(--paper)':'var(--surface)'}}>
                <div style={{fontWeight:600,fontSize:13}}>{o.k}</div>
                <div className="muted text-xs" style={{marginTop:2}}>{o.sub}</div>
              </button>
            ))}
          </div>
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>PIN</label>
          <div className="flex gap-2">
            <input type="password" value={pin} onChange={e=>setPin(e.target.value)} className="input mono" style={{flex:1,letterSpacing:'0.3em',textAlign:'center'}} placeholder="••••"/>
            <button type="button" className="btn" onClick={gen}>{I.spark} Gen</button>
          </div>
        </div>
      </div>
      <div className="modal-foot">
        <span className="muted text-xs">An invite will be sent to the address above.</span>
        <div className="flex gap-2"><button type="button" className="btn" onClick={onClose}>Cancel</button><button type="button" className="btn primary" onClick={handleSave}>Save member</button></div>
      </div>
    </Modal>
  );
}
 
// ─── Tweaks panel ──────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS={showLogin:false,startScreen:'dashboard',viewMode:'am',density:'balanced',accent:'#FB673E',paperTone:'warm'};
 
function TweaksPanel({t,setTweak,screen,setScreen}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
 
  React.useEffect(()=>{
    const h=e=>{const t=e?.data?.type;if(t==='__activate_edit_mode')setOpen(true);else if(t==='__deactivate_edit_mode')setOpen(false);};
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);
 
  if(!open)return null;
 
  const SCREENS=[
    {value:'dashboard',label:'Portfolio'},
    {value:'tracker',label:'Client tracker'},
    {value:'plan',label:'60·90·180'},
    {value:'client',label:'Client view'},
    {value:'team',label:'Team'},
  ];
 
  return(
    <div ref={ref} className="twk-panel">
      <div className="twk-hd">
        <b>Tweaks</b>
        <button type="button" className="twk-x" onClick={()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}>✕</button>
      </div>
      <div className="twk-body">
        <div className="twk-sect">Try a screen</div>
        <div className="twk-row">
          <div className="twk-label">Screen</div>
          <select className="twk-field" value={screen.kind} onChange={e=>{
            const v=e.target.value;
            if(v==='tracker'||v==='client'||v==='plan')setScreen({kind:v,clientId:'c1'});
            else setScreen({kind:v});
          }}>
            {SCREENS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </div>
        <div className="twk-sect">Login</div>
        <div className="twk-row twk-row-h">
          <div className="twk-label">Show login</div>
          <button type="button" className="twk-toggle" data-on={t.showLogin?'1':'0'} onClick={()=>setTweak('showLogin',!t.showLogin)}><i/></button>
        </div>
        <div className="twk-sect">Density</div>
        <div className="twk-row">
          <div className="twk-label">Spacing</div>
          <select className="twk-field" value={t.density} onChange={e=>setTweak('density',e.target.value)}>
            <option value="dense">Dense</option><option value="balanced">Balanced</option><option value="airy">Airy</option>
          </select>
        </div>
        <div className="twk-sect">Accent colour</div>
        <div className="twk-row">
          <div className="twk-label">Colour</div>
          <input type="color" value={t.accent} onChange={e=>setTweak('accent',e.target.value)} style={{width:56,height:26,border:'none',cursor:'pointer',borderRadius:6}}/>
        </div>
        <div className="twk-sect">Paper tone</div>
        <div className="twk-row">
          <div className="twk-label">Tone</div>
          <select className="twk-field" value={t.paperTone} onChange={e=>setTweak('paperTone',e.target.value)}>
            <option value="warm">Warm</option><option value="crisp">Crisp</option><option value="cool">Cool</option>
          </select>
        </div>
      </div>
    </div>
  );
}
 
// ─── App root ──────────────────────────────────────────────────────────────────
function useTweaks(defaults){
  const [v,setV]=React.useState(defaults);
  const setTweak=React.useCallback((k,val)=>setV(p=>({...p,[k]:val})),[]);
  return [v,setTweak];
}
 
function App(){
  const [t,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [authed,setAuthed]=React.useState(!t.showLogin);
  const [view,setView]=React.useState('am');
  const [screen,setScreen]=React.useState({kind:'dashboard'});
  const [modal,setModal]=React.useState(null);
  const [clients,setClients]=React.useState(INITIAL_CLIENTS);
  const [steps,setSteps]=React.useState(INITIAL_STEPS);
  const [team,setTeam]=React.useState(INITIAL_TEAM);
 
  // Tweaks sync
  React.useEffect(()=>setAuthed(!t.showLogin),[t.showLogin]);
  React.useEffect(()=>{
    const r=document.documentElement;
    if(t.density==='dense'){r.style.setProperty('--s-6','18px');r.style.setProperty('--s-7','24px');r.style.setProperty('--s-8','32px');}
    else if(t.density==='airy'){r.style.setProperty('--s-6','32px');r.style.setProperty('--s-7','40px');r.style.setProperty('--s-8','56px');}
    else{r.style.removeProperty('--s-6');r.style.removeProperty('--s-7');r.style.removeProperty('--s-8');}
    r.style.setProperty('--duda',t.accent);r.style.setProperty('--accent',t.accent);
    if(t.paperTone==='cool'){r.style.setProperty('--paper','#F0F2F5');r.style.setProperty('--hairline','#E0E3E8');}
    else if(t.paperTone==='crisp'){r.style.setProperty('--paper','#FFFFFF');r.style.setProperty('--hairline','#EAEAEA');}
    else{r.style.removeProperty('--paper');r.style.removeProperty('--hairline');}
  },[t.density,t.accent,t.paperTone]);
 
  // Steps mutations
  function toggleStep(id){setSteps(p=>p.map(s=>s.id===id?{...s,status:s.status==='done'?'not':'done'}:s));}
  function statusChange(id,status){setSteps(p=>p.map(s=>s.id===id?{...s,status}:s));}
  function deleteStep(id){if(window.confirm('Delete this task? This cannot be undone.'))setSteps(p=>p.filter(s=>s.id!==id));}
  function saveStep(updated){
    if(updated._delete){deleteStep(updated.id);return;}
    setSteps(p=>p.map(s=>s.id===updated.id?updated:s));
  }
 
  // Client mutations
  function addClient(c){
    setClients(p=>[...p,c]);
    // Navigate to new client tracker immediately
    setScreen({kind:'tracker',clientId:c.id});
    setView('am');
  }
 
  // Team mutations
  function addTeam(m){setTeam(p=>[...p,m]);}
  function deleteMember(id){setTeam(p=>p.filter(m=>m.id!==id));}
 
  const client=screen.clientId?clients.find(c=>c.id===screen.clientId):null;
 
  // View toggle — keeps clientId
  function handleSetView(v){
    setView(v);
    if(v==='client'&&screen.clientId&&screen.kind==='tracker')setScreen({kind:'client',clientId:screen.clientId});
    if(v==='am'&&screen.clientId&&screen.kind==='client')setScreen({kind:'tracker',clientId:screen.clientId});
  }
  function handleSetScreen(s){
    setScreen(s);
    if(s.kind==='client')setView('client');
    else if(s.kind==='tracker'||s.kind==='plan')setView('am');
  }
 
  const isClient=screen.kind==='client';
 
  if(!authed)return <Login team={team} onSuccess={()=>setAuthed(true)}/>;
 
  return(
    <>
      {!isClient&&<Topbar view={view} setView={handleSetView} screen={screen} setScreen={handleSetScreen} client={client}/>}
      {isClient&&(
        <div style={{position:'fixed',top:16,right:16,zIndex:300}}>
          <div className="view-toggle" style={{boxShadow:'0 4px 16px rgba(20,20,26,.1)'}}>
            <button type="button" className={view==='am'?'on':''} onClick={()=>handleSetView('am')}>AM view</button>
            <button type="button" className={view==='client'?'on':''} onClick={()=>handleSetView('client')}>Client view</button>
          </div>
        </div>
      )}
 
      {screen.kind==='dashboard'&&<Dashboard clients={clients} setScreen={handleSetScreen} onAddClient={()=>setModal({kind:'addClient'})}/>}
      {screen.kind==='tracker'&&client&&(
        <Tracker client={client} steps={steps} setScreen={handleSetScreen}
          onPlanEdit={id=>handleSetScreen({kind:'plan',clientId:id})}
          onToggle={toggleStep} onEdit={s=>setModal({kind:'editStep',step:s})}
          onDelete={deleteStep} onStatusChange={statusChange}/>
      )}
      {screen.kind==='plan'&&client&&<PlanView client={client} editable={view==='am'}/>}
      {screen.kind==='client'&&client&&<ClientView client={client} steps={steps} onOpenPlan={()=>handleSetScreen({kind:'plan',clientId:client.id})}/>}
      {screen.kind==='team'&&<TeamPage team={team} onAdd={()=>setModal({kind:'addTeam'})} onDeleteMember={deleteMember}/>}
 
      {modal?.kind==='addClient'&&<AddClientModal onClose={()=>setModal(null)} onSave={addClient}/>}
      {modal?.kind==='editStep'&&<EditStepModal step={modal.step} onClose={()=>setModal(null)} onSave={saveStep}/>}
      {modal?.kind==='addTeam'&&<AddTeamModal onClose={()=>setModal(null)} onSave={addTeam}/>}
 
      <TweaksPanel t={t} setTweak={setTweak} screen={screen} setScreen={handleSetScreen}/>
    </>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
