function Login({ onSuccess }) {
  const [pin, setPin] = React.useState(['', '', '', '']);
  const [error, setError] = React.useState(false);
  const refs = [React.useRef(), React.useRef(), React.useRef(), React.useRef()];
  function handleInput(i, val) {
    if (!/^\d?$/.test(val)) return;
    const next = [...pin];
    next[i] = val;
    setPin(next);
    setError(false);
    if (val && i < 3) refs[i + 1].current?.focus();
    if (next.every(d => d !== '')) {
      setTimeout(() => {
        if (next.join('') === '4178') {
          onSuccess();
        } else {
          setError(true);
          setTimeout(() => { setPin(['', '', '', '']); setError(false); refs[0].current?.focus(); }, 600);
        }
      }, 200);
    }
  }
  function handleKey(i, e) {
    if (e.key === 'Backspace' && !pin[i] && i > 0) {
      refs[i - 1].current?.focus();
    }
  }
  return (
    <div className="login-shell">
      <div className="login-poster">
        <div style={{position:'relative',zIndex:1}}>
          <div className="brand" style={{marginBottom:48}}>
            <span className="brand-mark"></span>
            Onward <sub>by Duda</sub>
          </div>
          <div className="brand-big">Every client,<br/><em>on track.</em></div>
        </div>
        <p className="lede" style={{position:'relative',zIndex:1,maxWidth:400}}>
          Onboarding management built for the way account managers actually work.
        </p>
      </div>
      <div className="login-form">
        <div className="eyebrow" style={{marginBottom:12}}>Welcome back</div>
        <h2 className="display-3">Enter your PIN</h2>
        <p className="muted" style={{marginTop:8,fontSize:14}}>Four digits. Ask your team lead if you don't have one.</p>
        <div className="pin-row">
          {pin.map((d, i) => (
            <input key={i} ref={refs[i]} type="text" inputMode="numeric" maxLength={1}
              className={`pin-cell ${d ? 'on' : ''} ${error ? 'err' : ''}`}
              value={d} onChange={e => handleInput(i, e.target.value)}
              onKeyDown={e => handleKey(i, e)} autoFocus={i === 0} />
          ))}
        </div>
        {error && <p style={{color:'var(--crimson)',fontSize:13,fontWeight:600}}>Wrong PIN — try again.</p>}
        <p className="faint text-xs" style={{marginTop:24}}>Demo PIN: <span className="mono">4178</span></p>
      </div>
    </div>
  );
}

const DESIGNATIONS = ['Champion', 'Executive', 'Primary', 'Technical'];

function DesignationPicker({ selected, onChange }) {
  function toggle(d) {
    if (selected.includes(d)) {
      onChange(selected.filter(x => x !== d));
    } else {
      onChange([...selected, d]);
    }
  }
  return (
    <div className="contact-tags">
      {DESIGNATIONS.map(d => (
        <button key={d} type="button"
          className={`contact-tag ${d.toLowerCase()} ${selected.includes(d) ? 'on' : ''}`}
          onClick={() => toggle(d)}>
          {d}
        </button>
      ))}
    </div>
  );
}

  const [newPhase, setNewPhase] = useState_M2('p1');
  const [newDue, setNewDue] = useState_M2(30);

  function toggleStep(id) {
    if (excludedSteps.includes(id)) {
      setExcludedSteps(excludedSteps.filter(x => x !== id));
    } else {
      setExcludedSteps([...excludedSteps, id]);
    }
  }

  function addCustomStep() {
    if (!newTitle.trim()) return;
    const id = 'custom_' + Math.random().toString(36).slice(2, 8);
    setCustomSteps([...customSteps, {
      id, phase: newPhase, title: newTitle.trim(), why: newWhy.trim(),
      owner: newOwner, prio: newPrio, status: 'not',
      start: Math.max(0, newDue - 7), due: newDue
    }]);
    setNewTitle(''); setNewWhy(''); setShowAddForm(false);
  }

  function removeCustomStep(id) {
    setCustomSteps(customSteps.filter(s => s.id !== id));
  }

  const included = steps.length - excludedSteps.length + customSteps.length;

  return (
    <div>
      <div className="flex items-center justify-between" style={{ marginBottom: 16 }}>
        <div>
          <div className="eyebrow">Onboarding template</div>
          <p className="muted text-sm" style={{ marginTop: 4 }}>
            Starting from <b>{icp} · {flow}</b>. {included} steps will be created — toggle to include/exclude.
          </p>
        </div>
        <button type="button" className="btn sm primary" onClick={() => setShowAddForm(!showAddForm)}>
          {ICONS.plus} Custom step
        </button>
      </div>

      {showAddForm && (
        <div className="custom-step-form">
          <div className="eyebrow" style={{ marginBottom: 8 }}>Add custom step</div>
          <input className="input" placeholder="Step title *" value={newTitle}
            onChange={e => setNewTitle(e.target.value)} style={{ marginBottom: 8 }} />
          <input className="input" placeholder="Why it matters" value={newWhy}
            onChange={e => setNewWhy(e.target.value)} style={{ marginBottom: 8 }} />
          <div className="field-row">
            <select className="input" value={newPhase} onChange={e => setNewPhase(e.target.value)}>
              {PHASES.map(p => <option key={p.id} value={p.id}>Phase {p.num} · {p.name}</option>)}
            </select>
            <select className="input" value={newOwner} onChange={e => setNewOwner(e.target.value)}>
              <option value="Duda">Owner: Duda</option>
              <option value="Client">Owner: Client</option>
              <option value="Both">Owner: Both</option>
            </select>
          </div>
          <div className="field-row" style={{ marginTop: 8 }}>
            <select className="input" value={newPrio} onChange={e => setNewPrio(e.target.value)}>
              {Object.keys(PRIO).map(k => <option key={k} value={k}>{PRIO[k].label}</option>)}
            </select>
            <div className="flex items-center gap-2">
              <span className="text-xs muted">Due day:</span>
              <input type="number" className="input" value={newDue} min={0} max={180}
                onChange={e => setNewDue(Number(e.target.value))} style={{ width: 80 }} />
            </div>
          </div>
          <div className="flex gap-2" style={{ marginTop: 10 }}>
            <button type="button" className="btn sm primary" onClick={addCustomStep}>Add step</button>
            <button type="button" className="btn sm ghost" onClick={() => setShowAddForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      {customSteps.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          <div className="text-xs semibold muted" style={{ padding: '8px 14px', textTransform: 'uppercase', letterSpacing: '0.12em' }}>
            Custom steps ({customSteps.length})
          </div>
          {customSteps.map(s => (
            <div key={s.id} className="step-toggle" style={{ background: 'var(--duda-tint)' }}>
              <input type="checkbox" checked readOnly />
              <div className="step-info">
                <div className="step-title-text">{s.title}</div>
                <div className="step-owner-text">{s.owner} · Day {s.due}</div>
              </div>
              <PrioPill prio={s.prio} />
              <button type="button" className="close" style={{ width: 24, height: 24 }}
                onClick={() => removeCustomStep(s.id)}>{ICONS.close}</button>
            </div>
          ))}
        </div>
      )}

      <div style={{ maxHeight: 320, overflow: 'auto', border: '1px solid var(--hairline)', borderRadius: 8, background: 'var(--surface)' }}>
        {PHASES.map(p => {
          const phaseSteps = steps.filter(s => s.phase === p.id);
          const excludedCount = phaseSteps.filter(s => excludedSteps.includes(s.id)).length;
          return (
            <div key={p.id}>
              <div style={{
                padding: '10px 16px', background: 'var(--paper)',
                borderBottom: '1px solid var(--hairline-soft)',
                fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.14em',
                color: 'var(--ink-muted)', fontWeight: 700,
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
              }}>
                <span>Phase {p.num} · {p.name} ({phaseSteps.length - excludedCount}/{phaseSteps.length})</span>
                <button type="button" className="btn sm ghost" style={{ fontSize: 10 }}
                  onClick={() => {
                    const allIds = phaseSteps.map(s => s.id);
                    const allExcluded = allIds.every(id => excludedSteps.includes(id));
                    if (allExcluded) {
                      setExcludedSteps(excludedSteps.filter(id => !allIds.includes(id)));
                    } else {
                      setExcludedSteps([...new Set([...excludedSteps, ...allIds])]);
                    }
                  }}>
                  Toggle all
                </button>
              </div>
              {phaseSteps.map(s => (
                <div key={s.id} className="step-toggle" style={{
                  opacity: excludedSteps.includes(s.id) ? 0.5 : 1
                }}>
                  <input type="checkbox"
                    checked={!excludedSteps.includes(s.id)}
                    onChange={() => toggleStep(s.id)} />
                  <div className="step-info">
                    <div className="step-title-text">{s.title}</div>
                    <div className="step-owner-text">{s.owner} · Day {s.due}</div>
                  </div>
                  <PrioPill prio={s.prio} />
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  });
  const [modal, setModal] = React.useState(null);
  const [clients, setClients] = React.useState(SAMPLE_CLIENTS.map(c => ({...c, status: c.status || 'active'})));
  const [steps, setSteps] = React.useState(SAMPLE_STEPS);
  const [team, setTeam] = React.useState(TEAM);

  React.useEffect(() => { setView(t.viewMode); }, [t.viewMode]);
  React.useEffect(() => { setAuthed(!t.showLogin); }, [t.showLogin]);

  const client = screen.clientId ? clients.find(c => c.id === screen.clientId) : null;

  React.useEffect(() => {
    const root = document.documentElement;
    if (t.density === 'dense') { root.style.setProperty('--s-6','18px'); root.style.setProperty('--s-7','24px'); root.style.setProperty('--s-8','32px'); }
    else if (t.density === 'airy') { root.style.setProperty('--s-6','32px'); root.style.setProperty('--s-7','40px'); root.style.setProperty('--s-8','56px'); }
    else { root.style.removeProperty('--s-6'); root.style.removeProperty('--s-7'); root.style.removeProperty('--s-8'); }
    root.style.setProperty('--accent', t.accent); root.style.setProperty('--duda', t.accent);
    if (t.paperTone === 'cool') { root.style.setProperty('--paper','#F0F2F5'); root.style.setProperty('--paper-soft','#F7F8FA'); root.style.setProperty('--hairline','#E0E3E8'); root.style.setProperty('--hairline-soft','#EBEDF1'); }
    else if (t.paperTone === 'crisp') { root.style.setProperty('--paper','#FFFFFF'); root.style.setProperty('--paper-soft','#FAFAFA'); root.style.setProperty('--hairline','#EAEAEA'); root.style.setProperty('--hairline-soft','#F2F2F2'); }
    else { root.style.removeProperty('--paper'); root.style.removeProperty('--paper-soft'); root.style.removeProperty('--surface'); root.style.removeProperty('--hairline'); root.style.removeProperty('--hairline-soft'); }
  }, [t.density, t.accent, t.paperTone]);

  function editClient(id, updates) { setClients(prev => prev.map(c => c.id === id ? {...c, ...updates} : c)); }
  function toggleStep(id) { setSteps(prev => prev.map(s => s.id === id ? {...s, status: s.status === 'done' ? 'not' : 'done'} : s)); }
  function saveStep(updated) {
    if (updated._delete) { setSteps(prev => prev.filter(s => s.id !== updated.id)); return; }
    setSteps(prev => prev.map(s => s.id === updated.id ? updated : s));
  }
  function deleteMember(id) { setTeam(prev => prev.filter(m => m.id !== id)); }

  if (!authed) return <Login onSuccess={() => setAuthed(true)} />;

  const effectiveScreen = (view === 'client' && screen.kind === 'tracker') ? { ...screen, kind: 'client' }
    : (view === 'am' && screen.kind === 'client') ? { ...screen, kind: 'tracker' } : screen;
  const isClientFacing = effectiveScreen.kind === 'client';

  return (
    <>
      {!isClientFacing && <Topbar view={view} setView={setView} screen={effectiveScreen} setScreen={setScreen} client={client}/>}
      {isClientFacing && (
        <div style={{position:'fixed',top:16,right:16,zIndex:20,display:'flex',gap:8}}>
          <div className="view-toggle" style={{boxShadow:'0 4px 16px rgba(26,23,20,.08)'}}>
            <button className={view==='am'?'on':''} onClick={()=>setView('am')}>AM view</button>
            <button className={view==='client'?'on':''} onClick={()=>setView('client')}>Client view</button>
          </div>
        </div>
      )}

      {effectiveScreen.kind==='dashboard' && <Dashboard clients={clients} setScreen={setScreen} onAddClient={()=>setModal({kind:'addClient'})} onEditClient={editClient}/>}
      {effectiveScreen.kind==='tracker' && client && <Tracker client={client} steps={steps} setScreen={setScreen} onPlanEdit={id=>setScreen({kind:'plan',clientId:id})} onStep={s=>setModal({kind:'editStep',step:s})} onToggleStep={toggleStep}/>}
      {effectiveScreen.kind==='plan' && client && <PlanView client={client} editable={view==='am'} onClose={()=>setScreen({kind:'tracker',clientId:client.id})}/>}
      {effectiveScreen.kind==='client' && client && <ClientView client={client} steps={steps} onOpenPlan={()=>setScreen({kind:'plan',clientId:client.id})} onToggleStep={toggleStep}/>}
      {effectiveScreen.kind==='team' && <TeamPage team={team} onAdd={()=>setModal({kind:'addTeam'})} onDeleteMember={deleteMember}/>}

      {modal?.kind==='addClient' && <AddClientModal onClose={()=>setModal(null)} onSave={c => { setClients(prev => [...prev, {...c, status:'active'}]); setScreen({kind:'tracker',clientId:c.id}); }}/>}
      {modal?.kind==='editStep' && <EditStepModal step={modal.step} onClose={()=>setModal(null)} onSave={saveStep}/>}
      {modal?.kind==='addTeam' && <AddTeamModal onClose={()=>setModal(null)}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Try a screen">
          <TweakSelect value={effectiveScreen.kind} onChange={v => {
            if (v==='dashboard') setScreen({kind:'dashboard'});
            else if (v==='tracker') setScreen({kind:'tracker',clientId:'c1'});
            else if (v==='plan') setScreen({kind:'plan',clientId:'c1'});
            else if (v==='client') setScreen({kind:'client',clientId:'c1'});
            else if (v==='team') setScreen({kind:'team'});
          }} options={[
            {value:'dashboard',label:'Portfolio dashboard'},{value:'tracker',label:'Client tracker'},
            {value:'plan',label:'60·90·180 plan'},{value:'client',label:'Client-facing view'},{value:'team',label:'Team management'},
          ]}/>
        </TweakSection>
        <TweakSection label="Login flow"><TweakToggle label="Show login screen" value={t.showLogin} onChange={v=>setTweak('showLogin',v)}/></TweakSection>
        <TweakSection label="Density"><TweakRadio value={t.density} onChange={v=>setTweak('density',v)} options={[{value:'dense',label:'Dense'},{value:'balanced',label:'Balanced'},{value:'airy',label:'Airy'}]}/></TweakSection>
        <TweakSection label="Accent color"><TweakColor value={t.accent} onChange={v=>setTweak('accent',v)} options={['#FB673E','#6D5BFF','#18A672','#F6BA1A','#14141A']}/></TweakSection>
        <TweakSection label="Paper tone"><TweakRadio value={t.paperTone} onChange={v=>setTweak('paperTone',v)} options={[{value:'warm',label:'Warm'},{value:'crisp',label:'Crisp'},{value:'cool',label:'Cool'}]}/></TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
